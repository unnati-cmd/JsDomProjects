<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- <h2 style="color:aliceblue">Calc</h2> -->
    <main>
        <div id="ans">88888888</div>
        <div class="container">
            <div class="game">
                <div class="btn">7</div>
                <div class="btn">8</div>
                <div class="btn">9</div>
                <div class="btn">DEL</div>

                <div class="btn">4</div>
                <div class="btn">5</div>
                <div class="btn">6</div>
                <div class="btn">+</div>

                <div class="btn">1</div>
                <div class="btn">2</div>
                <div class="btn">3</div>
                <div class="btn">-</div>

                <div class="btn">.</div>
                <div class="btn">0</div>
                <div class="btn">/</div>
                <div class="btn">x</div>

                <div class="btn reset">RESET</div>
                <div class="btn equal">=</div>
            </div>
        </div>
    </main>
    <footer style="color: #2E4C6D; font-size: 25px;"><h6>&copy;2026 Unnati Mishra</h6></footer>
    <script src="script.js"></script>
</body>
</html>
